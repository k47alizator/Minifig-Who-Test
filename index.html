<html lang="pl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minifig Who - Online</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --lego-yellow: #FFD500;
            --lego-red: #E3000B;
            --lego-blue: #006CB7;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        /* --- TWOJE ORYGINALNE STYLE --- */
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('img/tlo.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; margin: 0; text-align: center; min-height: 100vh; display: flex; flex-direction: column;
        }

        #menu, #game-area { padding: 40px 20px; position: relative; flex: 1; }

        h1.main-title {
            font-weight: 700; font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: 2px;
            text-transform: uppercase; color: var(--lego-yellow); text-shadow: 3px 3px 0px #B45309;
            margin-bottom: 5px; cursor: pointer; transition: all 0.2s ease; display: inline-block;
        }
        h1.main-title span { color: var(--lego-red); text-shadow: 3px 3px 0px #900; }

        .subtitle { font-size: 1rem; color: #9CA3AF; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }

        .start-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 800px; margin: 0 auto; }

        .brickle-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; padding: 30px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; align-items: center;
        }
        .brickle-card:hover { transform: translateY(-5px); }
        .create-card:hover { border-color: var(--lego-yellow); }
        .join-card:hover { border-color: var(--lego-red); }

        .icon-box { width: 65px; height: 65px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 20px; }
        .icon-yellow { background: var(--lego-yellow); color: #000; }
        .icon-red { background: var(--lego-red); color: #fff; }

        input {
            padding: 12px; font-family: 'Fredoka'; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
            width: 80%; text-align: center; background: rgba(0,0,0,0.4); color: white; margin-top: 20px;
        }

        .cat-btn, .action-btn, .exit-btn {
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px); color: white;
            cursor: pointer; font-weight: 600; text-transform: uppercase; transition: all 0.3s;
            border: 2px solid rgba(255, 213, 0, 0.4); padding: 12px 20px; border-radius: 12px;
        }
        .cat-btn:hover, .action-btn:hover { border-color: var(--lego-red); transform: scale(1.05); background: rgba(255,255,255,0.15); }

        .size-selector { display: flex; justify-content: center; gap: 15px; margin: 15px 0 35px; }
        .size-btn {
            background: rgba(255, 255, 255, 0.07); border: 2px solid rgba(255, 255, 255, 0.1);
            color: #9CA3AF; padding: 12px 25px; border-radius: 12px; cursor: pointer;
        }
        .size-btn.active { background: rgba(227, 0, 11, 0.15); border-color: var(--lego-red); color: white; }

        /* --- KARTY POSTACI --- */
        .character-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-width: 1200px; margin: 20px auto; }
        .card { background: white; border-radius: 15px; padding: 10px; cursor: pointer; transition: 0.2s; position: relative; border: 3px solid transparent; display: flex; flex-direction: column; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .card.eliminated { opacity: 0.15; filter: grayscale(100%); transform: scale(0.92); }
        .card-img-container { width: 100%; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; }
        .main-img { width: 100%; height: 100%; object-fit: contain; }
        .card-name { color: #111; font-size: 13px; font-weight: 700; margin-top: 10px; text-transform: uppercase; text-align: center; }
        .bing-badge { position: absolute; bottom: 5px; right: 5px; background: var(--lego-blue); color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; display: none; }

        /* --- INTERFEJS GRY --- */
        .target-box { background: var(--card-bg); padding: 15px 30px; border-radius: 20px; border: 3px solid var(--lego-yellow); display: flex; align-items: center; justify-content: space-between; gap: 20px; width: 100%; max-width: 900px; margin: 0 auto 30px auto; backdrop-filter: blur(10px); }
        .target-img-frame { width: 100px; height: 100px; background: white; border: 3px solid var(--lego-red); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .target-img-frame img { width: 100%; height: 100%; object-fit: contain; padding: 5px; }
        .game-logo { position: absolute; top: 20px; left: 20px; font-weight: 700; font-size: 1.6rem; color: var(--lego-yellow); text-shadow: 2px 2px 0px #B45309; cursor: pointer; text-transform: uppercase; }
        .game-logo span { color: var(--lego-red); text-shadow: 2px 2px 0px #900; }

        /* --- NOWOŚĆ: EKRAN WYGRANEJ --- */
        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #win-text { font-size: clamp(3rem, 15vw, 6rem); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }

        /* --- NOWOŚĆ: POPRAWIONY CZAT --- */
        #chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 1000; display: none; flex-direction: column; align-items: flex-end; }
        #chat-panel { display: none; width: 320px; height: 450px; background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; margin-bottom: 15px; flex-direction: column; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 75%; word-wrap: break-word; line-height: 1.4; color: white; }
        .my-msg { background: var(--lego-blue); align-self: flex-end; border-bottom-right-radius: 2px; }
        .other-msg { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 2px; }
        #chat-toggle-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--lego-blue); color: white; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); font-size: 24px; position: relative; }
        #chat-badge { position: absolute; top: -5px; right: -5px; background: var(--lego-red); color: white; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; display: none; align-items: center; justify-content: center; border: 2px solid white; font-weight: bold; }

        /* Tryb zgadywania */
        body.guessing-mode .card:not(.eliminated) { border-color: var(--lego-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(227, 0, 11, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(227, 0, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 0, 11, 0); } }

        .lego-footer { width: 100%; padding: 15px; font-size: 10px; color: rgba(156, 163, 175, 0.4); text-align: center; background: rgba(15, 23, 42, 0.5); }
    </style>
</head>

<div id="win-overlay">
    <h1 id="win-text">WYGRANA!</h1>
    <p id="win-subtext" style="font-size: 1.5rem; color: #9CA3AF; margin-bottom: 40px;">Świetna robota!</p>
    <button class="action-btn" style="padding: 20px 40px; font-size: 1.2rem;" onclick="location.reload()">ZAGRAJ PONOWNIE</button>
</div>

<div id="menu">

        <img src="img/Discord.webp" alt="Discord" style="width: 50px;">
    </div>
    <h1 class="main-title" onclick="location.reload()">Minifig <span>Who</span></h1>
    <p class="subtitle">Zgadnij postać przeciwnika</p>
    
    <div id="setup-view">
        <div class="start-grid">
            <div class="brickle-card create-card" onclick="createGame()">
                <div class="icon-box icon-yellow"><i class="fa-solid fa-plus"></i></div>
                <div class="card-title">Stwórz grę</div>
                <div class="card-desc">Załóż nowy pokój i zaproś znajomego.</div>
            </div>
            <div class="brickle-card join-card">
                <div class="icon-box icon-red"><i class="fa-solid fa-right-to-bracket"></i></div>
                <div class="card-title">Dołącz</div>
                <input type="text" id="room-input" placeholder="KOD POKOJU" onkeypress="if(event.key==='Enter') joinGame()">
                <button class="action-btn" style="margin-top: 15px; width: 80%;" onclick="joinGame()">WEJDŹ</button>
            </div>
        </div>
    </div>

    <div id="lobby-view" style="display: none;">
        <div style="background: var(--card-bg); padding: 15px 30px; border-radius: 15px; border: 2px solid var(--lego-red); display: inline-flex; align-items: center; gap: 20px;">
            <div style="text-align: left;">
                <p style="margin: 0; font-size: 11px; color: #9CA3AF;">KOD POKOJU:</p>
                <h2 id="display-code" style="margin: 0; font-size: 32px; letter-spacing: 3px;">----</h2>
            </div>
            <button onclick="copyRoomLink()" class="action-btn"><i class="fa-solid fa-share"></i></button>
        </div>
        
        <h3 style="margin: 30px 0 10px; color: #9CA3AF; font-size: 14px;">LICZBA KART:</h3>
        <div class="size-selector">
            <button class="size-btn" id="sz-21" onclick="syncSize(21)">21</button>
            <button class="size-btn active" id="sz-28" onclick="syncSize(28)">28</button>
            <button class="size-btn" id="sz-35" onclick="syncSize(35)">35</button>
        </div>

        <h3>WYBIERZ KATEGORIĘ (START):</h3>
        <div id="category-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 900px; margin: 0 auto;"></div>
    </div>
</div>

<div id="game-area" style="display: none;">
    <div class="game-logo" onclick="location.reload()">M<span>W</span></div>
    <div class="target-box">
        <div style="text-align: left; flex: 1;">
            <p style="margin: 0; color: #9CA3AF; font-size: 12px;">TWOJA POSTAĆ:</p>
            <h2 id="target-name" style="margin: 5px 0; color: var(--lego-yellow);">---</h2>
        </div>
        <div class="target-img-frame">
            <img id="target-img" src="" alt="">
        </div>
        <div style="flex: 1; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
            <button id="guess-mode-btn" onclick="toggleGuessMode()" class="action-btn" style="background: var(--lego-red); border: none;">ZGADUJĘ!</button>
            <button onclick="location.reload()" class="exit-btn">WYJDŹ</button>
        </div>
    </div>
    <div id="character-grid" class="character-grid"></div>
</div>

<div id="chat-widget">
    <div id="chat-panel">
        <div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; background: rgba(0,0,0,0.2);">CZAT</div>
        <div id="chat-messages"></div>
        <div style="padding: 10px; display: flex; gap: 5px; background: rgba(0,0,0,0.2);">
            <input type="text" id="chat-input" placeholder="Napisz..." style="margin-top:0; width: 70%;" onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button onclick="sendChatMessage()" class="action-btn" style="padding: 5px 12px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
    <button id="chat-toggle-btn" onclick="toggleChat()">
        <i class="fa-solid fa-comment-dots"></i>
        <div id="chat-badge">0</div>
    </button>
</div>

<div class="lego-footer">
    <p>Projekt fanowski. LEGO® jest znakiem towarowym Grupy LEGO.</p>
</div>

            {n:"Michael Knight"}, {n:"Sloth"}, {n:"Chase McCain"},
            {n:"Bójka"}, {n:"Bajka"}, {n:"Brawurka"}, {n:"Raven"}, {n:"Bestia (Beast Boy)"}, {n:"Starfire"}, {n:"Beetlejuice"}
        ],
        
        "LEGO INIEMAMOCNI": [
            {n:"Pan Iniemamocny (Bob Parr)"}, {n:"Elastyna (Helen Parr)"}, {n:"Maksymilian Parr (Maks)"}, {n:"Wiola Parr"}, {n:"Jack-Jack (Normalny)"}, {n:"Jack-Jack (Potwór)"}, {n:"Jack-Jack (Ogień)"},
            {n:"Mrożon (Lucius Best)"}, {n:"Edna Mode"}, {n:"Rick Dicker"}, {n:"Gazerbeam"}, {n:"Szybkobiegacz"}, {n:"Refleksja (Voyd)"}, {n:"Cegła (Brick)"}, {n:"Zgryz (Krushauer)"}, {n:"He-Lectrix"}, {n:"Krzesztand (Screech)"},
            {n:"Syndrom"}, {n:"Mirage"}, {n:"Bomb Voyage"}, {n:"Podkopywacz"}, {n:"Ekranocholik"},
            {n:"Pan Iniemamocny (Złota Era)"}, {n:"Elastyna (Złota Era)"}, {n:"Lucius Best (Cywil)"}, {n:"Tony Rydinger"}, {n:"Bernie Kropp"}, {n:"Gilbert Huph"}, {n:"Kari McKeen"}, {n:"Burmistrz Metroville"}, {n:"Policjant z Metroville"},
            {n:"Apogeum"}, {n:"Blazestone"}, {n:"Fylaks"}, {n:"Macroburst"}, {n:"Thunderhead"}, {n:"Universal Man"},
            {n:"Chudy (Toy Story)"}, {n:"Zygzak McQueen (Auta)"}, {n:"Merida Waleczna"}, {n:"Miguel (Coco)"}, {n:"Sulley (Potwory i Spółka)"}
        ]
};

let currentBoardSize = 28;
    let currentRoomCode = null;
    let myPlayerId = localStorage.getItem('minifig_uid') || Math.random().toString(36).substring(2, 10);
    localStorage.setItem('minifig_uid', myPlayerId);
    
    let myRole = null;
    let enemyTargetName = "";
    let isGuessMode = false;
    let isChatOpen = false;
    let unreadMessages = 0;

    // --- FUNKCJE POKOJU ---

    function createGame() {
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        myRole = 'host';
        fireDb.ref('rooms/' + code).set({
            hostId: myPlayerId,
            settings: { size: 28 },
            state: 'lobby',
            ts: Date.now()
        });
        enterLobby(code);
    }

    function joinGame() {
        const code = document.getElementById('room-input').value.trim();
        if(!code) return;
        fireDb.ref('rooms/' + code).once('value', snap => {
            if(!snap.exists()) return alert("Pokój nie istnieje!");
            myRole = 'guest';
            fireDb.ref('rooms/' + code).update({ guestId: myPlayerId });
            enterLobby(code);
        });
    }

    function enterLobby(code) {
        currentRoomCode = code;
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('lobby-view').style.display = 'block';
        document.getElementById('display-code').innerText = code;
        document.getElementById('chat-widget').style.display = 'flex';
        
        generateCategoryButtons();
        listenToRoom(code);
        listenToChat(code);
    }

    function syncSize(size) {
        if(currentRoomCode && myRole === 'host') {
            fireDb.ref('rooms/' + currentRoomCode + '/settings').update({ size: size });
        }
    }

    function listenToRoom(code) {
        fireDb.ref('rooms/' + code).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            if(data.settings) {
                currentBoardSize = data.settings.size;
                document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.getElementById('sz-' + currentBoardSize);
                if(activeBtn) activeBtn.classList.add('active');
            }

            if(data.state === 'playing' && data.category && !enemyTargetName) {
                initGameLocal(data.category, data.seed);
            }

            if(data.winner) {
                showWinScreen(data.winner);
            }
        });
    }

    function generateCategoryButtons() {
        const container = document.getElementById('category-buttons');
        container.innerHTML = '';
        Object.keys(db).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat.replace('LEGO ', '');
            btn.onclick = () => {
                fireDb.ref('rooms/' + currentRoomCode).update({
                    state: 'playing',
                    category: cat,
                    seed: Math.random()
                });
            };
            container.appendChild(btn);
        });
    }

    // --- MECHANIKA GRY ---

    function initGameLocal(category, seed) {
        const getFolderName = (n) => n.replace('LEGO ', '').toLowerCase().trim().replace(/\s+\/\s+/g, '-').replace(/\s+/g, '-');
        let pool = [];

        if (category === 'MIX') {
            Object.keys(db).forEach(cat => {
                const folder = getFolderName(cat);
                db[cat].forEach(char => pool.push({ ...char, folder: folder }));
            });
        } else {
            const folder = getFolderName(category);
            pool = db[category].map(char => ({ ...char, folder: folder }));
        }

        const random = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        const selected = pool.slice(0, currentBoardSize);
        const idx1 = Math.floor(random() * selected.length);
        const idx2 = (idx1 + 1) % selected.length;

        const myTarget = (myRole === 'host') ? selected[idx1] : selected[idx2];
        enemyTargetName = (myRole === 'host') ? selected[idx2].n : selected[idx1].n;

        renderBoard(myTarget, selected);
    }

    function renderBoard(target, selected) {
        document.getElementById('target-name').innerText = target.n;
        const targetImg = document.getElementById('target-img');
        const getGitUrl = (c) => `https://raw.githubusercontent.com/${githubConfig.user}/${githubConfig.repo}/main/${githubConfig.folder}/${c.folder}/${encodeURIComponent(c.n)}.webp`;
        const getBingUrl = (n) => `https://tse2.mm.bing.net/th?q=lego+${encodeURIComponent(n.replace(/\(.*\)/, ''))}+minifigure&w=200&h=300&c=7`;

        targetImg.src = getGitUrl(target);
        targetImg.onerror = function() { this.src = getBingUrl(target.n); };

        const grid = document.getElementById('character-grid');
        grid.innerHTML = '';

        selected.forEach(char => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img-container">
                    <img class="main-img" src="${getGitUrl(char)}">
                    <div class="bing-badge">BING</div>
                </div>
                <div class="card-name">${char.n}</div>
            `;

            const img = card.querySelector('.main-img');
            img.onerror = function() { 
                this.src = getBingUrl(char.n); 
                card.querySelector('.bing-badge').style.display = "block";
            };

            card.onclick = () => {
                if(isGuessMode) {
                    if(confirm(`Czy to: ${char.n}?`)) {
                        if(char.n === enemyTargetName) fireDb.ref('rooms/' + currentRoomCode).update({ winner: myPlayerId });
                        else {
                            fireDb.ref('rooms/' + currentRoomCode).once('value', s => {
                                const d = s.val();
                                const other = (myPlayerId === d.hostId) ? d.guestId : d.hostId;
                                fireDb.ref('rooms/' + currentRoomCode).update({ winner: other });
                            });
                        }
                    }
                    toggleGuessMode();
                } else {
                    card.classList.toggle('eliminated');
                }
            };
            grid.appendChild(card);
        });

        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }

    function toggleGuessMode() {
        isGuessMode = !isGuessMode;
        document.body.classList.toggle('guessing-mode', isGuessMode);
        document.getElementById('guess-mode-btn').innerText = isGuessMode ? "ANULUJ" : "ZGADUJĘ!";
    }

    // --- NOWY EKRAN WYGRANEJ ---
    function showWinScreen(winnerId) {
        const overlay = document.getElementById('win-overlay');
        const winText = document.getElementById('win-text');
        const winSub = document.getElementById('win-subtext');
        
        overlay.style.display = 'flex';
        
        if(winnerId === myPlayerId) {
            winText.innerText = "WYGRANA! 🎉";
            winText.style.color = "var(--lego-yellow)";
            winSub.innerText = "Gratulacje! Odgadłeś postać pierwszy.";
        } else {
            winText.innerText = "PRZEGRANA! 💀";
            winText.style.color = "var(--lego-red)";
            winSub.innerText = "Przeciwnik był szybszy tym razem...";
        }
    }

    // --- POPRAWIONY CZAT ---
    function toggleChat() {
        isChatOpen = !isChatOpen;
        document.getElementById('chat-panel').style.display = isChatOpen ? 'flex' : 'none';
        if(isChatOpen) { unreadMessages = 0; document.getElementById('chat-badge').style.display = 'none'; }
    }

    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        if (input.value.trim() && currentRoomCode) {
            fireDb.ref('rooms/' + currentRoomCode + '/chat').push({
                text: input.value.trim(), sender: myPlayerId, ts: Date.now()
            });
            input.value = '';
        }
    }

    function listenToChat(code) {
        fireDb.ref('rooms/' + code + '/chat').on('child_added', snap => {
            const data = snap.val();
            const msg = document.createElement('div');
            
            // Podział na strony:
            if (data.sender === myPlayerId) {
                msg.className = 'chat-msg my-msg';
            } else {
                msg.className = 'chat-msg other-msg';
            }
            
            msg.innerText = data.text;
            const box = document.getElementById('chat-messages');
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
            
            if(!isChatOpen && data.sender !== myPlayerId) {
                unreadMessages++;
                document.getElementById('chat-badge').innerText = unreadMessages;
                document.getElementById('chat-badge').style.display = 'flex';
            }
        });
    }

    function copyRoomLink() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("Skopiowano link do pokoju!"));
    }
</script>
</body>
</html>
